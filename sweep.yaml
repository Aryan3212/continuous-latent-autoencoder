program: train.py
method: bayes
metric:
  name: val_stft
  goal: minimize
parameters:
  train.batch_size:
    values: [4, 8, 16]
  train.grad_accum_steps:
    values: [2, 4, 8]
  latent_noise.sigma_max:
    values: [0.05, 0.1, 0.2]
  aug.wave_aug.noise_prob:
    values: [0.0, 0.2, 0.5]
  aug.wave_aug.lowpass_prob:
    values: [0.0, 0.2]
  loss.stft_weight:
    min: 2.0
    max: 8.0
  loss.jepa.weight:
    min: 5.0
    max: 15.0
  loss.sigreg.weight:
    min: 1.0
    max: 5.0

command:
  - "uv"
  - "run"
  - "train.py"
  - "--config"
  - "configs/exp0.yaml"
  - "--data.segment_seconds=2.0"
  - "--eval.asr.enabled=false"
  - "--train.max_steps=1000"
  - "--train.eval_interval_steps=500"
  - ${args}
