program: train.py
method: bayes
metric:
  name: val_stft
  goal: minimize
parameters:
  model.encoder.d_model:
    values: [256]
  model.bottleneck.latent_dim:
    values: [256]
  model.bottleneck.kind:
    values: ["identity"]
  latent_noise.sigma_max:
    values: [0.05, 0.1, 0.2]
  aug.wave_aug.noise_prob:
    values: [0.0, 0.2, 0.5]
  aug.wave_aug.lowpass_prob:
    values: [0.0, 0.2]
  loss.stft_weight:
    min: 0.1
    max: 5.0
  loss.jepa.weight:
    min: 0.1
    max: 10.0
  loss.sigreg.weight:
    min: 0.1
    max: 5.0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "configs/exp0.yaml"
  - ${args}
