program: train.py
method: bayes
metric:
  name: val_stft
  goal: minimize
parameters:
  model.encoder.d_model:
    values: [128, 256, 512]
  model.bottleneck.latent_dim:
    values: [32, 64, 128]
  optim.lr:
    min: 0.0001
    max: 0.002
  loss.stft_weight:
    min: 0.1
    max: 5.0
  loss.jepa.weight:
    min: 0.1
    max: 10.0
  loss.sigreg.weight:
    min: 0.1
    max: 5.0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "configs/exp0.yaml"
  - ${args}
