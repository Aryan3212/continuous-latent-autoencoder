# Kaggle 12h-session variant of exp_3m_gan. Inherits the full architecture +
# loss recipe via _base_ and overrides ONLY what differs on Kaggle:
#   - fixed run_id  -> every session resumes the SAME W&B run + runs/ dir
#   - amp on        -> Kaggle T4/P100 are fine with fp16 (the local GTX 1660 was not)
#   - out_dir       -> writable /kaggle/working so checkpoints survive the session
#   - manifests     -> generated by `housekeeping.py make-manifests` into /kaggle/working
#   - num_workers   -> Kaggle gives ~4 vCPUs
#
# Architecture and loss weights live in exp_3m_gan.yaml — change them THERE, not
# here, so checkpoints stay loadable across sessions.
#
# NOTE: train.max_steps stays at the base 30000 and spans the WHOLE run (not one
# session); the LR schedule's total_steps now derives from it automatically, so
# raise train.max_steps ALONE to train longer, e.g.
#   uv run python train.py --config configs/kaggle_3m_gan.yaml train.max_steps=60000
# The wall-clock budget (--max_hours) ends each session; scheduler state restores
# on resume.
_base_: configs/exp_3m_gan.yaml

run:
  run_id: clae_3m_kaggle
  out_dir: /kaggle/working/runs
  amp: true
  gpu_mem_fraction: 0.95    # dedicated T4 (~15 GB) -> ~13.8 GiB for PyTorch; aggressive (CUDA ctx+NCCL ~0.9 GiB sit on top), drop to 0.92 if it OOMs at the cap

# Under DDP (`torchrun --nproc_per_node=N` on more than one GPU),
# train.batch_size is PER-GPU and effective batch =
# batch_size * grad_accum_steps * N. The base batch_size: 10 was sized for the
# 6 GB GTX 1660 — on 16 GB T4/P100 raise it (and lower grad_accum to keep the
# effective batch where you want it) via `-- train.batch_size=... grad_accum_steps=...`.
data:
  train_manifest: /kaggle/working/manifests/train.jsonl
  val_manifest: /kaggle/working/manifests/val.jsonl
  # Pipeline is mp3-decode + on-the-fly resample bound, so feed the GPU hard:
  num_workers: 3            # per-GPU under DDP; 3x2=6 over ~4 vCPU — oversubscribe since reads block on I/O
  persistent_workers: true  # keep spawn'd workers + their resampler cache warm across epochs (safe w/ MALLOC_ARENA_MAX=2)
  prefetch_factor: 6        # deep queue smooths the sawtooth; ~9MB/batch -> ~330MB total, trivial on 30GB
