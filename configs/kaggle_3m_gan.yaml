# Kaggle 12h-session variant of exp_3m_gan. Inherits the full architecture +
# loss recipe via _base_ and overrides ONLY what differs on Kaggle:
#   - fixed run_id  -> every session resumes the SAME W&B run + runs/ dir
#   - amp on        -> Kaggle T4/P100 are fine with fp16 (the local GTX 1660 was not)
#   - out_dir       -> writable /kaggle/working so checkpoints survive the session
#   - manifests     -> generated by `housekeeping.py make-manifests` into /kaggle/working
#   - num_workers   -> Kaggle gives ~4 vCPUs
#
# Architecture and loss weights live in exp_3m_gan.yaml — change them THERE, not
# here, so checkpoints stay loadable across sessions.
#
# NOTE: max_steps / scheduler.total_steps stay at the base 30000. That spans the
# WHOLE run (not one session); the wall-clock budget (--max_hours) ends each
# session, and the scheduler state is restored on resume. Raise BOTH together to
# train longer.
_base_: configs/exp_3m_gan.yaml

run:
  run_id: clae_3m_kaggle
  out_dir: /kaggle/working/runs
  amp: true

data:
  train_manifest: /kaggle/working/manifests/train.jsonl
  val_manifest: /kaggle/working/manifests/val.jsonl
  num_workers: 4
