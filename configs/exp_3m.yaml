# ~3.1M-param run: strong d_model=128 encoder, small decoder, LeJEPA-style 48-d
# projector, and the FULL loss suite (JEPA + SIGReg + multi-res STFT). Based on
# exp0.yaml; changes are the model dims, projector, reconstruction weights, and
# manifests (point at the housekeeping `build` staging output).

run:
  run_id: null
  out_dir: runs
  seed: 0
  amp: true
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: "exp_3m"

data:
  sample_rate: 16000
  segment_seconds: 3.0
  # Produced by: python scripts/housekeeping.py make-manifests --out-dir staging/manifests
  train_manifest: "staging/manifests/train.jsonl"
  val_manifest: "staging/manifests/val.jsonl"
  num_workers: 8
  pin_memory: true
  persistent_workers: true

aug:
  waveform_aug_global:
    enabled: true
    noise_prob: 1.0
    noise_snr_min: 0.0
    noise_snr_max: 25.0
    lowpass_prob: 1.0
    lowpass_min_freq: 2700.0
    lowpass_max_freq: 8000.0
    gain_prob: 1.0
    gain_min: 0.6
    gain_max: 1.5
    clip_prob: 0.3
    clip_min: 0.5
  waveform_aug_local_mask:
    enabled: true
    ratio: 0.25
    min_span_frames: 2
    max_span_frames: 8

model:
  frontend:
    channels: [32, 64, 96, 128, 128]
    kernels:  [10, 8, 8, 4, 4]
    strides:  [5, 4, 4, 4, 4]      # product=1280 -> 12.5Hz at 16k
    groups: 8
  encoder:
    d_model: 128
    n_layers: 7                    # strong encoder: ~2.25M params (71% of model)
    num_heads: 4
    feedforward_dim: 384           # 3x d_model
    dropout: 0.1
    cnn_module_kernel: 31
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 2
      period: 3
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
      identity_mix: true
      alpha_init: 0.01
  decoder:
    channels: 160                  # small decoder
    up_strides: [4, 4, 4, 4, 5]
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 1
    res_dilations: [1, 3, 9]
    film_hidden: 64
  projector:
    # LeJEPA-style: projector output_dim < d_model is intended (cf.
    # lejepa_minimal_impl.py: MLP(512,[2048,2048,proj_dim]) with proj_dim=16).
    # SIGReg shapes the 48-d projection; the 128-d encoder output stays healthy
    # indirectly. (weight_decay is 1e-5, not the 1e-2 that caused exp0's collapse.)
    hidden_dim: 512
    output_dim: 48
    n_hidden_layers: 2

loss:
  # Reconstruction ON this run (multi-res STFT).
  recon_type: stft              # "stft" | "mel" — reconstruction loss used for training
  recon_weight: 1.0            # weight applied to whichever recon loss is active
  recon_log_start_step: 1000   # only log the STFT log-mag metric after this many steps
  reg_type: sigreg             # "sigreg" | "visreg" — which Gaussianisation loss is trained
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
    center: true
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.1             # mag/logmag dominate for speech
    mag_weight: 1.0
    logmag_weight: 1.0
  mel:
    n_mels: 80
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    fmin: 0.0
    fmax: null                 # null -> sample_rate/2
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.0             # mel is log-mag; SC off
    mag_weight: 1.0
    logmag_weight: 1.0
  jepa:
    weight: 3.0
    num_globals: 2
    num_locals: 4

  sigreg:
    weight: 0.05
    num_slices: 1024
    t_max: 5.0
    n_points: 17
  visreg:
    weight: 0.05                # mirror sigreg default unless tuned
    num_projections: 256       # VISReg random-projection count (K)

optim:
  lr: 5.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-5
  scheduler:
    warmup_steps: 2000
    min_lr_ratio: 0.0
  grad_clip: 1.0

train:
  batch_size: 12                 # fits the 6GB GTX 1660; raise on bigger GPUs
  grad_accum_steps: 16           # effective batch = 12*16 = 192 (~the original 200)
  max_steps: 60000               # more data than the prior run -> longer schedule
  log_interval_steps: 10
  eval_interval_steps: 5000
  save_interval_steps: 10000
  probe_interval_steps: 100
  val_batches: null

eval:
  enabled: true
  emotion:
    enabled: false
  gender:
    enabled: false
  asr:
    enabled: true
    train_manifest: "staging/manifests/asr_probe_train.jsonl"
    dev_manifest: "staging/manifests/asr_probe_val.jsonl"
    text_key: text
    steps: 8000
    batch_size: 16
    segment_seconds: 15.0
    max_samples: 500
