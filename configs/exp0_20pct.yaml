_base_: "configs/exp0.yaml"

# Inherit from exp0 but override for 20% data run with memory optimizations
data:
  # Note: manifests are JSONL files produced by scripts/create_clean_manifest.py
  train_manifest: "data/manifests/experiment_v2_train_20pct.jsonl"
  val_manifest: "data/manifests/experiment_v2_val.jsonl"
  segment_seconds: 4.0        # Reduced from 6.0 to save memory

model:
  encoder:
    mhc:
      enabled: true           # Kept as requested
      num_streams: 2
      sinkhorn_iters: 6       # Reduced to save memory
  decoder:
    res_blocks_per_up: 1      # Reduced from 2 to save memory

train:
  batch_size: 4               # Reduced from 8 as requested
  grad_accum_steps: 16        # Increased to maintain effective batch 64
  max_steps: 10000 
  save_interval_steps: 2500
  eval_interval_steps: 2500
  log_interval_steps: 50

run:
  run_id: "exp0_20pct_lowmem"
  amp: false                  # Explicitly disabled
  wandb:
    name: "exp0_20pct_lowmem"
    project: "continuous-latent-ae"

gan:
  enabled: true               # Enabled as requested
  start_step: 5000
