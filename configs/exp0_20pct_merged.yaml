run:
  run_id: null                # if null, auto-generate
  out_dir: runs
  seed: 0
  device: auto               # auto | cpu | cuda
  amp: false
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: null

data:
  # Note: manifests are JSONL files produced by scripts/create_clean_manifest.py
  sample_rate: 16000
  segment_seconds: 2.0
  train_manifest: "data/manifests/experiment_v1/train.jsonl"
  val_manifest: "data/manifests/experiment_v1/val.jsonl"
  num_workers: 4
  pin_memory: true

aug:
  wave_aug:
    enabled: true
    noise_prob: 0.1
    noise_snr_min: 5.0
    noise_snr_max: 20.0
    lowpass_prob: 0.1
    gain_prob: 0.1
    clip_prob: 0.05

model:
  frontend:
    channels: [64, 128, 192, 256, 256]
    kernels:  [10, 8, 8, 4, 4]
    strides:  [5, 4, 4, 4, 4]    # product=1280 -> 12.5Hz at 16k
    groups: 8
  encoder:
    d_model: 256
    n_layers: 6
    num_heads: 4
    feedforward_dim: 512
    dropout: 0.1
    cnn_module_kernel: 31
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 2
      period: 3
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
      identity_mix: true
      alpha_init: 0.01
  predictor:
    kind: mlp
    hidden_dim: 256
    n_layers: 2
    dropout: 0.1
  decoder:
    channels: 256
    up_strides: [4, 4, 4, 4, 5]
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 2
    res_dilations: [1, 3, 9]
    film_hidden: 128

loss:
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
    center: true
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 1.0
    mag_weight: 1.0
    logmag_weight: 1.0
  wav_l1_weight: 0.0
  jepa:
    weight: 1.0
  sigreg:
    weight: 0.1
    num_slices: 256
    t_max: 3.0
    n_points: 17
    reduction: mean
    clip_value: null

gan:
  enabled: false
  start_step: 0
  periods: [2, 3, 5, 7, 11]
  msd_scales: 3
  d_lr: 5.0e-5
  d_betas: [0.8, 0.99]
  d_weight_decay: 0.0

optim:
  lr: 3.0e-2
  betas: [0.9, 0.98]
  eps: 1.0e-8
  weight_decay: 1.0e-3
  scheduler:
    warmup_steps: 2000
    total_steps: 10000
    min_lr_ratio: 0.0
  grad_clip: 1.0

train:
  batch_size: 8
  grad_accum_steps: 1
  max_steps: 6000       # Shortened for Sweep (allows 2 probes at 2500, 5000)
  log_interval_steps: 50
  eval_interval_steps: 2000
  save_interval_steps: 2500
  val_batches: 8
  run_eval_on_save: true

eval:
  enabled: true
  emotion:
    enabled: false
  gender:
    enabled: false
  asr:
    enabled: true
    train_manifest: "data/manifests/asr_probe/train_asr.jsonl"
    dev_manifest: "data/manifests/asr_probe/val_asr.jsonl"
    text_key: text
    steps: 2500           # Train probe for 2500 steps
    batch_size: 16
    use_latent: false
# Inherit from exp0 but override for 20% data run
data:
  # Note: manifests are JSONL files produced by scripts/create_clean_manifest.py
  train_manifest: "data/manifests/experiment_v1/train_20pct.jsonl"
  # Keep same val manifest for consistent evaluation
  val_manifest: "data/manifests/experiment_v1/val.jsonl"

train:
  # Reduce max steps proportionally (approx 20% of original if we wanted full convergence)
  # But for a "check how it does" run, we might want enough steps to see convergence
  max_steps: 10000 
  save_interval_steps: 2500
  eval_interval_steps: 2500
  log_interval_steps: 50

run:
  run_id: "exp0_20pct_smoke"
  wandb:
    name: "exp0_20pct_smoke"
    project: "continuous-latent-ae"
