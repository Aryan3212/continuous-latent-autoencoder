# Large-scale config: ~2000h, 24GB GPU (RTX 4090 / A10G), mixed precision.
#
# Objective: mel reconstruction + JePA + VISReg, FastConformer encoder
# (Squeeze-and-Excitation + 9-tap conv). GAN is OFF for the real run; flip it
# on via the smoke-test command overrides to exercise the adversarial path.
#
# Dataset assumptions:
#   2000 hours @ 16kHz, 3s segments, batch 64 = 37,500 steps/epoch
#   Warmup ~1% = 15,000 steps, cosine decay to 0 over the rest

run:
  seed: 42
  amp: true
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: "large-2kh-simplified-jepa"

data:
  sample_rate: 16000
  segment_seconds: 3.0
  train_manifest: "data/manifests/train.jsonl"
  val_manifest: null
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

aug:
  waveform_aug_global:
    enabled: true
    noise_prob: 0.5
    noise_snr_min: 10.0
    noise_snr_max: 30.0
    lowpass_prob: 0.3
    lowpass_min_freq: 2000.0
    lowpass_max_freq: 8000.0
    gain_prob: 0.5
    gain_min: 0.7
    gain_max: 1.3
    clip_prob: 0.1
    clip_min: 0.5
  waveform_aug_local:
    enabled: true
    noise_prob: 0.8
    noise_snr_min: 3.0
    noise_snr_max: 15.0
    lowpass_prob: 0.6
    lowpass_min_freq: 1500.0
    lowpass_max_freq: 6000.0
    gain_prob: 0.8
    gain_min: 0.5
    gain_max: 1.7
    clip_prob: 0.3
    clip_min: 0.3
  waveform_aug_local_mask:
    enabled: true
    ratio: 0.5
    min_span_frames: 4
    max_span_frames: 24
  frontend_frame_local_mask:
    enabled: true
    ratio: 0.5
    min_span_frames: 4
    max_span_frames: 24
  decoder_input_mask:
    enabled: true
    ratio: 0.5
    min_span_frames: 4
    max_span_frames: 24
  decoder_input_noise:
    enabled: true
    std: 0.03

model:
  frontend:
    channels: [128, 256, 384, 512, 512]
    kernels: [10, 8, 8, 4, 4]
    strides: [5, 4, 4, 4, 4]
    groups: 4
  encoder:
    # FastConformer: Squeeze-and-Excitation + 9-tap conv (drop-in for Conformer).
    encoder_type: fastconformer
    d_model: 256
    n_layers: 8
    num_heads: 8
    feedforward_dim: 1024
    dropout: 0.1
    cnn_module_kernel: 9
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 2
      period: 3
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
      identity_mix: true
      alpha_init: 0.01
  decoder:
    channels: 768                  # ~7.5M params (was 384 / ~2.2M) -> closer to 8M target
    up_strides: [4, 4, 4, 4, 5]    # exact reverse of frontend.strides -> Mimi-style conv mirror
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 2
    res_dilations: [1, 3, 9]
    film_hidden: 192
  projector:
    hidden_dim: 512
    output_dim: 64
    n_hidden_layers: 1

loss:
  recon_type: mel              # "stft" | "mel" — reconstruction loss used for training
  recon_views: all
  recon_weight: 2         # weight applied to whichever recon loss is active
  recon_log_start_step: 10   # only log the mel log-mag metric after this many steps
  reg_type: visreg             # "sigreg" | "visreg" — which Gaussianisation loss is trained
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
    center: true
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.01
    mag_weight: 10.0
    logmag_weight: 10.0
  mel:
    n_mels: 80
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    fmin: 0.0
    fmax: null                 # null -> sample_rate/2
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.0             # mel is log-mag; SC off
    mag_weight: 1.0
    logmag_weight: 1.0
  jepa:
    weight: 2.0
    num_globals: 2
    num_locals: 4

  sigreg:
    weight: 0.05
    num_slices: 1024
    t_max: 5.0
    n_points: 17
  visreg:
    weight: 0.05                # mirror sigreg default unless tuned
    num_projections: 256       # VISReg random-projection count (K)
  adv:
    enabled: false             # real run: no GAN. Smoke test overrides enabled=true + early start.
    adv_weight: 0.3
    fm_weight: 0.5
    adv_start_step: 65000
    fm_start_step: 65000
    lr: 1.0e-4
    betas: [0.8, 0.99]
    periods: [2, 3, 5, 7, 11]
    disc_channels: [32, 64, 128, 192]    # ~1.65M params (was [32,128,256,512] / ~11M) -> ~2M target

optim:
  lr: 1.0e-3
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-5
  scheduler:
    warmup_steps: 15000
    total_steps: 200000
    min_lr_ratio: 0.0
  grad_clip: 1.0

train:
  batch_size: 32
  grad_accum_steps: 4
  max_steps: 100000
  log_interval_steps: 50
  eval_interval_steps: 5000
  save_interval_steps: 20000
  probe_interval_steps: 5000
  val_batches: 10
