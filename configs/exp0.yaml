run:
  run_id: null                # if null, auto-generate
  out_dir: runs
  seed: 0
  amp: true
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: null

data:
  # Note: manifests are JSONL files produced by `python scripts/housekeeping.py build`
  # (or fetched from HF Hub via `make fetch-data`).
  sample_rate: 16000
  segment_seconds: 3.0
  train_manifest: "data/manifests/combined_train.jsonl"
  val_manifest: "data/manifests/combined_val.jsonl"
  num_workers: 8
  pin_memory: true
  persistent_workers: true

aug:
  wave_aug:
    enabled: true
    noise_prob: 1.0             # always add noise; intensity sampled per-sample
    noise_snr_min: 0.0          # loud end: noise matches speech
    noise_snr_max: 25.0         # gentle end: barely audible
    lowpass_prob: 1.0           # always lowpass; cutoff sampled per-sample
    lowpass_min_freq: 2700.0    # was 1500: don't train invariance to the timbre band gender/emotion probes need. NB: pre-2026-06-11 runs used a boxcar filter whose true -3dB point was ~0.44x this value; cutoffs are now accurate (windowed-sinc)
    lowpass_max_freq: 8000.0    # gentle: Nyquist, ≈ identity
    gain_prob: 1.0              # always vary volume
    gain_min: 0.6
    gain_max: 1.5
    clip_prob: 0.3              # keep occasional — clipping is non-linear/destructive
    clip_min: 0.5
  wave_chunk_mask:
    # Waveform-space chunk masking applied to LOCAL views only (V-JEPA / MAE
    # tube-masking analogue for 1-D audio). Frame-aligned: spans are sampled
    # in frame units, then expanded to samples_per_frame contiguous samples.
    enabled: true
    target_ratio: 0.25          # mask ~25% of frames per local view
    min_span_frames: 2          # 2 frames = 160 ms @ 12.5 Hz frame rate
    max_span_frames: 8          # 8 frames = 640 ms

model:
  frontend:
    channels: [64, 128, 160, 192, 192]
    kernels:  [10, 8, 8, 4, 4]
    strides:  [5, 4, 4, 4, 4]    # product=1280 -> 12.5Hz at 16k
    groups: 8
  encoder:
    d_model: 192
    n_layers: 4
    num_heads: 4
    feedforward_dim: 576        # 3x d_model
    dropout: 0.1
    cnn_module_kernel: 31
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 2
      period: 3
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
      identity_mix: true
      alpha_init: 0.01
  decoder:
    channels: 320
    up_strides: [4, 4, 4, 4, 5]
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 2
    res_dilations: [1, 3, 9]
    film_hidden: 64
  projector:
    # LeJEPA / LeWM projector: encoder out -> JEPA + SIGReg loss space.
    # Decoder and downstream probes still read raw encoder output (hE).
    # BatchNorm is load-bearing — it's what lets SIGReg actually reshape
    # to N(0, I) (LayerNorm-style encoder outputs resist Gaussianisation).
    hidden_dim: 896
    output_dim: 192             # was 64: must be >= d_model (192) — a narrower projector hides encoder dims from every loss and lets them collapse
    n_hidden_layers: 2

loss:
  recon_type: stft              # "stft" | "mel" — reconstruction loss used for training
  recon_weight: 0.005          # weight applied to whichever recon loss is active
  recon_log_start_step: 1000   # only log the STFT log-mag metric after this many steps
  reg_type: sigreg             # "sigreg" | "visreg" — which Gaussianisation loss is trained
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
    center: true
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.1             # mag/logmag dominate for speech
    mag_weight: 1.0
    logmag_weight: 1.0
  mel:
    n_mels: 80
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    sample_rate: 16000
    fmin: 0.0
    fmax: null                 # null -> sample_rate/2
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 0.0             # mel is log-mag; SC off
    mag_weight: 1.0
    logmag_weight: 1.0
  jepa:
    weight: 3.0                 # NB: wandb rank charts before the 2026-06-11 logging fix understate z_rank* by 10x (log_interval dilution); don't retune against the old charts
    # Asymmetric global/local recipe (DINO-style): globals-only center anchors
    # the loss; locals get L_predict + L_context against it; L_global enforces
    # cross-global consistency. Total views = num_globals + num_locals.
    num_globals: 2              # lightly-augmented anchor views (no waveform chunk mask)
    num_locals: 4               # heavily-masked views (waveform chunk mask applied)

  sigreg:
    weight: 0.05                  # LeJEPA paper recommendation (robust across experiments)
    num_slices: 1024
    t_max: 5.0                  # paper default: symmetric [-t_max, t_max]
    n_points: 17
  visreg:
    weight: 0.05                # mirror sigreg default unless tuned
    num_projections: 256       # VISReg random-projection count (K)
    # z_weight / utt_weight removed 2026-06-11: frame-level SIGReg on p only
    # (LeJEPA-pure). Collapse monitors: z_rank* and p_rank_utt gauges — if
    # p_rank_utt sags toward 1-2, reintroduce utterance-level SIGReg.

optim:
  lr: 5.0e-4                    # LeJEPA paper range: 5e-4 to 5e-3
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-5          # was 1e-2 (LeJEPA range 1e-1/1e-2/1e-5): at this scale it deletes encoder dims no loss constrains
  scheduler:
    warmup_steps: 2000
    min_lr_ratio: 0.0
  grad_clip: 1.0

train:
  batch_size: 50
  grad_accum_steps: 4
  max_steps: 30000
  log_interval_steps: 10
  eval_interval_steps: 5000
  save_interval_steps: 10000
  probe_interval_steps: 100   # embedding similarity probe (clean-vs-aug pos/neg MSE on z)
  val_batches: null       # Evaluate on the entire validation set

eval:
  enabled: true
  emotion:
    enabled: false
  gender:
    enabled: false
  asr:
    enabled: true
    train_manifest: "data/manifests/asr_probe_train.jsonl"
    dev_manifest: "data/manifests/asr_probe_val.jsonl"
    text_key: text
    steps: 8000                 # was 1000: probe was far from converged, making ASR numbers uninformative
    batch_size: 16
    segment_seconds: 15.0 # Longer segments for CTC: 15s → ~187 frames
    max_samples: 500
