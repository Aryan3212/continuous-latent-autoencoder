run:
  run_id: null                # if null, auto-generate
  out_dir: runs
  seed: 0
  device: auto               # auto | cpu | cuda
  amp: true
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: null

data:
  sample_rate: 16000
  segment_seconds: 3.0
  train_manifest: "data/shards/train/train-{000000..000117}.tar"
  val_manifest: "data/shards/val/val-000000.tar"
  shuffle_size: 1000
  num_workers: 8
  pin_memory: true
  persistent_workers: true

aug:
  feature_mask:
    enabled: true
    time_mask_prob: 0.65       # Typical wav2vec2/HuBERT masking ratio
    time_mask_len: 5           # 5 tokens @ 12.5Hz = 400ms masking span
  wave_aug:
    enabled: true
    noise_prob: 0.1
    noise_snr_min: 5.0
    noise_snr_max: 20.0
    reverb_prob: 0.0      # RIR dataset needed for true reverb, placeholder for now
    lowpass_prob: 0.1
    gain_prob: 0.1
    clip_prob: 0.05
  mix:
    enabled: true
    snr_db_min: 3.0
    snr_db_max: 15.0
    prob: 0.5
    swap_prob: 0.5

model:
  frontend:
    channels: [64, 128, 192, 256, 256]
    kernels:  [10, 8, 8, 4, 4]
    strides:  [5, 4, 4, 4, 4]    # product=1280 -> 12.5Hz at 16k
    groups: 8
  encoder:
    d_model: 192
    n_layers: 4
    num_heads: 4
    query_head_dim: 48
    pos_head_dim: 4
    value_head_dim: 48
    feedforward_dim: 768
    dropout: 0.1
    cnn_module_kernel: 31
    pos_dim: 192
    warmup_batches: 20000.0
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 2
      period: 3
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
      identity_mix: true
      alpha_init: 0.01
  predictor:
    kind: mlp
    hidden_dim: 256
    n_layers: 2
    dropout: 0.1
  decoder:
    channels: 512
    up_strides: [4, 4, 4, 4, 5]
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 2
    res_dilations: [1, 3, 9]
    film_hidden: 128
    latent_norm: true
    latent_norm_eps: 1.0e-5
    latent_stats_path: null

loss:
  stft_weight: 0.2
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
    center: true
    window: hann
    logmag_eps: 1.0e-3
    sc_weight: 1.0
    mag_weight: 1.0
    logmag_weight: 1.0
  wav_l1_weight: 0.0
  jepa:
    weight: 2.0
    mix_view_weight: 1.0        # Exp1+: z_mix -> z_primary alignment
  sigreg:
    weight: 0.5
    num_slices: 256
    t_max: 3.0
    n_points: 17
    reduction: mean
    clip_value: null
    var_weight: 1.0
  mix_recon:
    enabled: true              # Exp1+: decode from mix -> primary
    weight: 1.0
    start_step: 0
  primary:
    enabled: true
    weight: 1.0

gan:
  enabled: true
  start_step: 15000
  warmup_steps: 5000
  periods: [2, 3, 5, 7, 11]
  msd_scales: 3
  mpd_channels: 32
  msd_channels: 16
  d_lr: 5.0e-5
  d_betas: [0.8, 0.99]
  d_weight_decay: 0.0

latent_noise:
  enabled: true               # RAE Trick: Train decoder on noisy latents
  kind: uniform
  warmup_steps: 5000
  sigma_max: 0.02              # Reduced to prevent divergence during GAN warmup

optim:
  kind: scaled_adam             # scaled_adam | adamw
  lr: 1.0e-4
  betas: [0.9, 0.98]
  eps: 3.0e-5
  weight_decay: 1.0e-3
  clipping_scale: 3.0
  scalar_lr_scale: 0.1
  param_min_rms: 1.0e-5
  param_max_rms: 3.0
  scalar_max: 10.0
  size_update_period: 4
  clipping_update_period: 100
  scheduler:
    kind: eden
    lr_batches: 10000
    lr_epochs: 4
    warmup_batches: 1000
    warmup_start: 0.5
  grad_clip: 1.0

train:
  batch_size: 20
  grad_accum_steps: 2
  max_steps: 250000       # Reduced for a few epochs (~3 epochs on 50% data)
  log_interval_steps: 150
  eval_interval_steps: 5000
  save_interval_steps: 5000
  val_batches: null       # Evaluate on the entire validation set
  run_eval_on_save: true

eval:
  enabled: true
  emotion:
    enabled: false
  gender:
    enabled: false
  asr:
    enabled: true
    train_manifest: "data/shards/asr_eval_train/asr_eval_train-{000000..000010}.tar"
    dev_manifest: "data/shards/asr_eval_val/asr_eval_val-{000000..000001}.tar"
    text_key: text
    steps: 2500           # Train probe for 2500 steps
    batch_size: 16
    segment_seconds: 15.0 # Longer segments for CTC: 15s → ~187 frames
    max_samples: 2000     # Cap samples to limit CPU RAM + disk IO during eval
    use_latent: false
