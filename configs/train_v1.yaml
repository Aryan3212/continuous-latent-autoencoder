run:
  run_id: train_v1
  out_dir: runs
  seed: 42
  device: auto
  amp: false
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: "train-v1"

data:
  sample_rate: 16000
  segment_seconds: 2.0
  train_manifest: data/manifest_train_10pct.jsonl
  val_manifest: null
  num_workers: 4
  pin_memory: true

aug:
  feature_mask:
    enabled: true
    time_mask_prob: 0.7
    time_mask_len: 8
    channel_mask_prob: 0.3
    channel_mask_len: 32
  mix:
    enabled: true
    prob: 0.5
    snr_db_min: 0.0
    snr_db_max: 20.0

model:
  frontend:
    channels: [64, 128, 192, 256, 256]
    kernels:  [10, 8, 8, 4, 4]
    strides:  [5, 4, 4, 4, 4]
    groups: 8
  encoder:
    d_model: 192
    n_layers: 4
    num_heads: 4
    query_head_dim: 32
    pos_head_dim: 4
    value_head_dim: 16
    feedforward_dim: 384
    dropout: 0.1
    cnn_module_kernel: 31
    pos_dim: 192
    warmup_batches: 4000.0
    mhc:
      enabled: true
      num_streams: 2
      start_layer: 1
      period: 2
      sinkhorn_iters: 10
      tau: 0.05
      dropout: 0.0
  bottleneck:
    latent_dim: 32
    norm: layernorm
  predictor:
    kind: mlp
    hidden_dim: 256
    n_layers: 2
    dropout: 0.1
  decoder:
    channels: 256
    up_strides: [4, 4, 4, 4, 5]
    up_kernels: [8, 8, 8, 8, 10]
    res_blocks_per_up: 2
    res_dilations: [1, 3, 9]
    film_hidden: 128
    latent_norm: false
    latent_stats_path: null

loss:
  stft:
    fft_sizes: [256, 512, 1024, 2048]
    hop_ratio: 0.25
    win_ratio: 1.0
  stft_weight: 0.01
  wav_l1_weight: 0.0
  jepa:
    weight: 1.2
    mix_view_weight: 1.0
  sigreg:
    weight: 1.0
    num_slices: 256
    t_max: 3.0
    n_points: 17
  mix_recon:
    enabled: true
    weight: 0.01
  primary:
    enabled: true
    weight: 0.05

gan:
  enabled: true
  start_step: 2500
  g_adv_weight: 0.01
  fm_weight: 0.0005
  d_lr: 1.0e-4

latent_noise:
  enabled: true
  sigma_max: 0.05
  warmup_steps: 2000

optim:
  kind: scaled_adam
  lr: 1.0e-4
  betas: [0.9, 0.98]
  eps: 1.0e-8
  weight_decay: 1.0e-3
  clipping_scale: 3.0
  scalar_lr_scale: 0.1
  grad_clip: 1.0
  scheduler:
    kind: eden
    lr_batches: 5000
    lr_epochs: 6
    warmup_batches: 500
    warmup_start: 0.5

train:
  batch_size: 5
  grad_accum_steps: 6
  max_steps: 10000
  log_interval_steps: 50
  eval_interval_steps: 1000
  save_interval_steps: 1000
  val_batches: 8
  run_eval_on_save: false
