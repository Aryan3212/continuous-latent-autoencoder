run:
  run_id: smoke_test_wandb
  out_dir: runs
  seed: 0
  device: auto
  amp: true
  wandb:
    enabled: true
    project: "continuous-latent-ae"
    name: "smoke-test"

data:
  sample_rate: 16000
  segment_seconds: 1.0
  train_manifest: data/manifest_train.jsonl
  val_manifest: null
  num_workers: 0
  pin_memory: false

aug:
  feature_mask:
    enabled: true
    time_mask_prob: 0.5
    time_mask_len: 4
    channel_mask_prob: 0.1
    channel_mask_len: 16

model:
  frontend:
    channels: [32, 32]
    kernels:  [10, 4]
    strides:  [5, 4]
    groups: 1
  encoder:
    d_model: 32
    n_layers: 2
    num_heads: 2
    query_head_dim: 16
    pos_head_dim: 4
    value_head_dim: 16
    feedforward_dim: 64
    dropout: 0.0
    cnn_module_kernel: 7
    pos_dim: 32
    warmup_batches: 100.0
    mhc:
      enabled: false
  bottleneck:
    latent_dim: 8
    norm: layernorm
  predictor:
    kind: mlp
    hidden_dim: 32
    n_layers: 1
    dropout: 0.0
  decoder:
    channels: 32
    up_strides: [4, 5]
    up_kernels: [8, 10]
    res_blocks_per_up: 1
    res_dilations: [1]
    film_hidden: 32
    latent_norm: false
    latent_stats_path: null

loss:
  stft:
    fft_sizes: [128, 256]
    hop_ratio: 0.25
    win_ratio: 1.0
  wav_l1_weight: 0.0
  jepa:
    weight: 1.0
    mix_view_weight: 0.0
  sigreg:
    weight: 0.1
    num_slices: 16
    t_max: 3.0
    n_points: 17
  mix_recon:
    enabled: false
  primary:
    enabled: false

optim:
  kind: adamw
  lr: 1.0e-3
  betas: [0.9, 0.99]
  eps: 1.0e-8
  weight_decay: 0.0
  grad_clip: 1.0
  scheduler:
    kind: null

train:
  batch_size: 4
  grad_accum_steps: 1
  max_steps: 10
  log_interval_steps: 1
  eval_interval_steps: 10
  save_interval_steps: 10
  val_batches: 1
  run_eval_on_save: false
