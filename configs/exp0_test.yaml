aug:
  feature_mask:
    enabled: true
    time_mask_len: 5
    time_mask_prob: 0.65
  mix:
    enabled: true
    prob: 0.5
    snr_db_max: 15.0
    snr_db_min: 3.0
    swap_prob: 0.5
  wave_aug:
    clip_prob: 0.05
    enabled: true
    gain_prob: 0.1
    lowpass_prob: 0.1
    noise_prob: 0.1
    noise_snr_max: 20.0
    noise_snr_min: 5.0
    reverb_prob: 0.0
data:
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  sample_rate: 16000
  segment_seconds: 3.0
  shuffle_size: 1000
  train_manifest: data/shards/train/train-{000000..000058}.tar
  val_manifest: data/shards/val/val-000000.tar
eval:
  asr:
    batch_size: 16
    dev_manifest: data/shards/asr_eval_val/asr_eval_val-{000000..000001}.tar
    enabled: true
    steps: 2
    text_key: text
    train_manifest: data/shards/asr_eval_train/asr_eval_train-{000000..000010}.tar
    use_latent: false
  emotion:
    enabled: false
  enabled: true
  gender:
    enabled: false
gan:
  d_betas:
  - 0.8
  - 0.99
  d_lr: 0.0002
  d_steps_per_g_step: 1
  d_weight_decay: 0.0
  enabled: true
  fm_weight: 10.0
  g_adv_weight: 1.0
  mpd_channels: 24
  msd_channels: 12
  msd_scales: 3
  periods:
  - 2
  - 3
  - 5
  - 7
  - 11
  start_step: 0
latent_noise:
  enabled: true
  kind: uniform
  sigma_max: 0.1
  warmup_steps: 10000
loss:
  jepa:
    mix_view_weight: 1.0
    weight: 15.0
  kl_weight: 0.0
  mix_recon:
    enabled: true
    start_step: 0
    weight: 1.0
  primary:
    enabled: true
    weight: 1.0
  sigreg:
    clip_value: null
    n_points: 17
    num_slices: 256
    reduction: mean
    t_max: 3.0
    weight: 0.05
  stft:
    center: true
    fft_sizes:
    - 256
    - 512
    - 1024
    - 2048
    hop_ratio: 0.25
    logmag_eps: 0.001
    logmag_weight: 1.0
    mag_weight: 1.0
    sc_weight: 1.0
    win_ratio: 1.0
    window: hann
  stft_weight: 10.0
  use_lejepa_on_hE: false
  wav_l1_weight: 0.0
model:
  decoder:
    channels: 512
    film_hidden: 128
    latent_norm: false
    latent_norm_eps: 1.0e-05
    latent_stats_path: null
    res_blocks_per_up: 2
    res_dilations:
    - 1
    - 3
    - 9
    up_kernels:
    - 8
    - 8
    - 8
    - 8
    - 10
    up_strides:
    - 4
    - 4
    - 4
    - 4
    - 5
  encoder:
    cnn_module_kernel: 31
    d_model: 192
    dropout: 0.1
    feedforward_dim: 768
    mhc:
      alpha_init: 0.01
      dropout: 0.0
      enabled: true
      identity_mix: true
      num_streams: 2
      period: 3
      sinkhorn_iters: 10
      start_layer: 2
      tau: 0.05
    n_layers: 4
    num_heads: 4
    pos_dim: 192
    pos_head_dim: 4
    query_head_dim: 48
    value_head_dim: 48
    warmup_batches: 20000.0
  frontend:
    channels:
    - 64
    - 128
    - 192
    - 256
    - 256
    groups: 8
    kernels:
    - 10
    - 8
    - 8
    - 4
    - 4
    strides:
    - 5
    - 4
    - 4
    - 4
    - 4
  predictor:
    dropout: 0.1
    hidden_dim: 256
    kind: mlp
    n_layers: 2
optim:
  betas:
  - 0.9
  - 0.98
  clipping_scale: 3.0
  clipping_update_period: 100
  eps: 3.0e-05
  grad_clip: 1.0
  kind: scaled_adam
  lr: 0.0001
  param_max_rms: 3.0
  param_min_rms: 1.0e-05
  scalar_lr_scale: 0.1
  scalar_max: 10.0
  scheduler:
    kind: eden
    lr_batches: 10000
    lr_epochs: 4
    warmup_batches: 1000
    warmup_start: 0.5
  size_update_period: 4
  weight_decay: 0.001
run:
  amp: true
  device: auto
  out_dir: runs
  run_id: null
  seed: 0
  wandb:
    enabled: true
    name: null
    project: continuous-latent-ae
train:
  batch_size: 24
  eval_interval_steps: 2
  grad_accum_steps: 2
  log_interval_steps: 1
  max_steps: 5
  run_eval_on_save: true
  save_interval_steps: 4
  val_batches: 2
