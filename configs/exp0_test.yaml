aug:
  wave_aug:
    clip_prob: 0.05
    enabled: true
    gain_prob: 0.1
    lowpass_prob: 0.1
    noise_prob: 0.1
    noise_snr_max: 20.0
    noise_snr_min: 5.0
data:
  # Note: manifests are JSONL files produced by scripts/create_clean_manifest.py
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  sample_rate: 16000
  segment_seconds: 3.0
  train_manifest: data/manifests/train.jsonl
  val_manifest: data/manifests/val.jsonl
eval:
  asr:
    batch_size: 16
    dev_manifest: data/manifests/asr_probe_val.jsonl
    enabled: true
    steps: 2
    text_key: text
    train_manifest: data/manifests/asr_probe_train.jsonl
    use_latent: false
  emotion:
    enabled: false
  enabled: true
  gender:
    enabled: false
gan:
  d_betas:
  - 0.8
  - 0.99
  d_lr: 5.0e-5
  d_weight_decay: 0.0
  enabled: true
  mpd_channels: 24
  msd_channels: 12
  msd_scales: 3
  periods:
  - 2
  - 3
  - 5
  - 7
  - 11
  start_step: 0
loss:
  jepa:
    weight: 15.0
  sigreg:
    clip_value: null
    n_points: 17
    num_slices: 256
    reduction: mean
    t_max: 3.0
    weight: 0.05
  stft:
    center: true
    fft_sizes:
    - 256
    - 512
    - 1024
    - 2048
    hop_ratio: 0.25
    logmag_eps: 0.001
    logmag_weight: 1.0
    mag_weight: 1.0
    sc_weight: 1.0
    win_ratio: 1.0
    window: hann
  stft_weight: 10.0
  wav_l1_weight: 0.0
model:
  decoder:
    channels: 512
    film_hidden: 128
    res_blocks_per_up: 2
    res_dilations:
    - 1
    - 3
    - 9
    up_kernels:
    - 8
    - 8
    - 8
    - 8
    - 10
    up_strides:
    - 4
    - 4
    - 4
    - 4
    - 5
  encoder:
    cnn_module_kernel: 31
    d_model: 192
    dropout: 0.1
    feedforward_dim: 768
    num_heads: 4
    mhc:
      alpha_init: 0.01
      dropout: 0.0
      enabled: true
      identity_mix: true
      num_streams: 2
      period: 3
      sinkhorn_iters: 10
      start_layer: 2
      tau: 0.05
    n_layers: 4
  frontend:
    channels:
    - 64
    - 128
    - 192
    - 256
    - 256
    groups: 8
    kernels:
    - 10
    - 8
    - 8
    - 4
    - 4
    strides:
    - 5
    - 4
    - 4
    - 4
    - 4
  predictor:
    dropout: 0.1
    hidden_dim: 256
    kind: mlp
    n_layers: 2
optim:
  betas:
  - 0.9
  - 0.98
  eps: 3.0e-05
  grad_clip: 1.0
  lr: 0.0001
  scheduler:
    warmup_steps: 1000
    total_steps: 5
    min_lr_ratio: 0.0
  weight_decay: 0.001
run:
  amp: true
  device: auto
  out_dir: runs
  run_id: null
  seed: 0
  wandb:
    enabled: true
    name: null
    project: continuous-latent-ae
train:
  batch_size: 24
  eval_interval_steps: 2
  grad_accum_steps: 2
  log_interval_steps: 1
  max_steps: 5
  run_eval_on_save: true
  save_interval_steps: 4
  val_batches: 2
