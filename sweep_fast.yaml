program: train.py
method: bayes
metric:
  name: val_stft
  goal: minimize
parameters:
  # We test variations around your requested batch size.
  train.batch_size:
    values: [16, 32]
  train.grad_accum_steps:
    values: [2, 4, 8]
    
  # Learning rate variations around the new 1.0e-3 baseline
  optim.lr:
    values: [5.0e-4, 1.0e-3, 2.0e-3]

  # GAN discriminator learning rate tuning (often needs to be balanced with generator LR)
  gan.d_lr:
    values: [1.0e-4, 2.0e-4, 4.0e-4]

  # Augmentation tuning
  latent_noise.sigma_max:
    values: [0.05, 0.1, 0.2]
  aug.wave_aug.noise_prob:
    values: [0.0, 0.2, 0.5]

  # Loss weight tuning
  loss.stft_weight:
    min: 2.0
    max: 8.0
  loss.jepa.weight:
    min: 5.0
    max: 15.0
  loss.sigreg.weight:
    min: 1.0
    max: 5.0

command:
  - "uv"
  - "run"
  - "train.py"
  - "--config"
  - "configs/exp0.yaml"
  - "--data.train_manifest=data/manifests/sweep_train_subset.jsonl"
  - "--data.segment_seconds=2.0"
  - "--eval.asr.enabled=false"
  - "--train.max_steps=1000"
  - "--train.eval_interval_steps=500"
  - "--train.save_interval_steps=1000"
  - ${args}
